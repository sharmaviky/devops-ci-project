name: CI-CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-app:latest .

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/devops-app:latest

      # 🔥 REMOVE kubectl validation (ye galat tha)
      # - name: Validate Kubernetes manifests
      #   run: kubectl create --dry-run=client -f k8s/

      # ✅ NEW: Install kubeval
      - name: Install kubeval
        run: |
          curl -LO https://github.com/instrumenta/kubeval/releases/latest/download/kubeval-linux-amd64.tar.gz
          tar -xvf kubeval-linux-amd64.tar.gz
          sudo mv kubeval /usr/local/bin/

      # ✅ NEW: Validate YAML
      - name: Validate Kubernetes manifests
        run: kubeval k8s/*.yaml